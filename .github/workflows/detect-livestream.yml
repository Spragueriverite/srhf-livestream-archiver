name: Detect Sunday Livestream

on:
  schedule:
    # 9:00 AM PST (UTC-8) = 17:00 UTC
    # During Daylight Saving (Mar–Nov) this fires at 10:00 AM PDT.
    # The script runs for up to 90 minutes, covering 9:00–10:30 AM PST in winter
    # and 10:00–11:30 AM PDT in summer.
    - cron: '30 16 * * 0'
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 100

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gspread google-auth requests

      - name: Run livestream detector
        env:
          FACEBOOK_PAGE_URL: ${{ vars.FACEBOOK_PAGE_URL }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
        run: python detect_livestream.py
