name: Archive Sunday Livestream

on:
  schedule:
    # 2:00 PM PST (UTC-8) = 22:00 UTC
    # During Daylight Saving (Mar–Nov) this fires at 3:00 PM PDT — still after the service.
    - cron: '0 22 * * 0'
  workflow_dispatch:

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yt-dlp internetarchive gspread google-auth requests

      - name: Run archive script
        env:
          FACEBOOK_PAGE_URL: ${{ vars.FACEBOOK_PAGE_URL }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
        run: python archive_livestream.py
