name: Archive Sunday Livestream

on:
  schedule:
    # 2:00 PM PST (UTC-8) = 22:00 UTC | Note: during Daylight Saving (Mar–Nov)
    # this will run at 3:00 PM PDT. Adjust to '0 21 * * 0' if you prefer PDT.
    - cron: '0 22 * * 0'
  workflow_dispatch: # Allows manual triggering from the Actions tab (great for testing)

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 90 # Videos can be large — give it plenty of time

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yt-dlp internetarchive gspread google-auth

      - name: Run archive script
        env:
          FACEBOOK_PAGE_URL: ${{ vars.FACEBOOK_PAGE_URL }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: python archive_livestream.py
